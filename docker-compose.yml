services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: signal
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d signal"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      # Overrides .env.local so the app always hits the Docker postgres
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/signal

volumes:
  postgres_data:
